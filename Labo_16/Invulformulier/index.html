<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opdracht: invulformulier</title>
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>

<form>
    <fieldset>
        <legend>Persoonlijke informatie</legend>

        <div>
            <label for="firstname">Voornaam*:</label>
            <input type="text" id="firstname" name="firstname" placeholder="Your first name" required autofocus>
        </div>
        <div>
            <label for="lastname">Familienaam*:</label>
            <input type="text" id="lastname" name="lastname" placeholder="Your last name" required>
        </div>

    </fieldset>

    <fieldset>
        <legend>Sport</legend>

        <p>Welke sport beoefen je?</p>
        <div>
            <input type="checkbox" id="lopen" name="lopen">
            <label for="lopen">Lopen</label>
        </div>
        <div>
            <input type="checkbox" id="zwemmen" name="zwemmen">
            <label for="zwemmen">Zwemmen</label>
        </div>
        <div>
            <input type="checkbox" id="roeien" name="roeien">
            <label for="roeien">Roeien</label>
        </div>

    </fieldset>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>

        <div>
            <input type="radio" id="post" name="post">
            <label for="post">Per post</label>
        </div>
        <div>
            <input type="radio" id="mail" name="mail">
            <label for="mail">E-mail</label>
        </div>
    </fieldset>

    <fieldset>
        <legend>Favorieten</legend>
        <div>
            <label for="film">Favoriete film:</label>
            <input type="text" id="film" name="film">
        </div>
        <div>
            <label for="quote">Favoriete quote:</label>
            <input type="text" id="quote" name="quote" placeholder="Schrijf je favorite quote">
        </div>
        <div>
            <label for="eten">Favoriete eten:</label>
            <select id="eten" name="eten" size="3" multiple>
                <option>Hamburger</option>
                <option>Hot-dog</option>
                <option>Pizza</option>
            </select>
        </div>
        <div>
            <label for="browser">Favoriete browser:</label>
            <input type="text" id="browser" name="browser">
        </div>

    </fieldset>

    <fieldset>
        <legend>Beveiliging & contact</legend>
        <div>
            <label for="password">Wachtwoord*:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div>
            <label for="email">E-mailadres:</label>
            <input type="email" id="email" name="email" placeholder="Geef je e-mailadres in">
        </div>

        <div>
            <label for="site">Favoriete site:</label>
            <input type="text" id="site" name="site" placeholder="Geef de URL van je favoriete site">
        </div>

    </fieldset>

    <fieldset>
        <legend>Extra informatie</legend>

        <div>
            <label for="tien">Favoriete getal tussen 1-10:</label>
            <input type="number" id="tien" name="tien"   max="10" min="1">
        </div>
        <div>
            <label for="duizend">Favoriete getal tussen 11-1000:</label>
            <input type="range" id="duizend" name="duizend" max="1000" min="11">
        </div>
        <div>
            <label for="geboorte">Wanneer ben je geboren?</label>
            <input type="date" id="geboorte" name="geboorte">
        </div>
        <div>
            <label for="postcode">Belgische postcode*:</label>
            <input type="text" pattern="([1-8][0-9]{3}|9([0-8][0-9]{2}|9([0-8][0-9]|9[0-2])))" id="postcode" name="postcode" required >
        </div>

    </fieldset>

    <fieldset>
        <legend>Varia</legend>
        <div>
            <label for="iets">Zoeken naar iets:</label>
            <input type="text" id="iets" name="iets">
        </div>
        <div>
            <label for="kleur">Wat is je lievelingskleur?</label>
            <input type="color" id="kleur" name="kleur">
        </div>
        <div>
            <label for="bestand"></label>
            <input type="file" id="bestand" name="bestand" placeholder="Geen bestand gekozen">
        </div>

    </fieldset>
    <button>Submit</button>
</form>
</body>
</html>
